<!DOCTYPE html>
<html>
<head>
<title>Cool Job Website</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    text-align:center;
    font-family:Arial, sans-serif;
    background:linear-gradient(to right,#141e30,#243b55);
    color:white;
    margin-top:80px;
}

h2{
    font-size:32px;
}

button{
    font-size:18px;
    padding:14px 22px;
    margin:12px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    color:white;
    background:#ff4b2b;
    transition:0.3s;
}

button:hover{
    background:#ff1c00;
    transform:scale(1.05);
}

#qualification{
    display:none;
    margin-top:30px;
    font-size:22px;
}

#overlay{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.5);
    color:white;
    display:none;
    z-index:9999;
}

#overlayText{
    margin-top:40vh;
    font-size:24px;
}

/* popup */
#popup{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.6);
    display:none;
}

#popupBox{
    background:white;
    color:black;
    width:280px;
    padding:20px;
    border-radius:10px;
    margin:200px auto;
    text-align:center;
}

.popupBtn{
    background:#333;
    margin:5px;
}
</style>
</head>

<body>

<h2>Welcome to Future Job Portal 😎</h2>

<button onclick="playJob()">Click here to get a job</button>
<button onclick="playRich()">₹1 Cr per month job</button>

<br><br>

<button onclick="playAge()">When you become 23</button>
<button onclick="playMillion()">When you say you become millioner</button>
<button onclick="playModi()">Support Modi</button>
<button onclick="playStudent()">Ek click me ladki pataye</button>

<div id="qualification">
<h3>Required Qualifications</h3>
<p>BPSC</p>
<p>IIT</p>
<p>NEET</p>
</div>

<!-- AUDIO FILES -->
<audio id="a1" src="song.mp3"></audio>
<audio id="a2" src="fun.mp3"></audio>
<audio id="a3" src="age.mp3"></audio>
<audio id="a4" src="million.mp3"></audio>
<audio id="a5" src="modi.mp3"></audio>
<audio id="a6" src="student.mp3"></audio>

<div id="overlay">
<div id="overlayText">Please wait... audio is playing</div>
</div>

<script>

function playAudio(id){
    let audio = document.getElementById(id);
    document.getElementById("overlay").style.display="block";
    audio.play();

    audio.onended = function(){
        document.getElementById("overlay").style.display="none";
    }
}

function playJob(){
    playAudio("a1");
}

function playRich(){
    document.getElementById("qualification").style.display="block";
    playAudio("a2");
}

function playAge(){
    playAudio("a3");
}

function playMillion(){
    playAudio("a4");
}

function playModi(){
    playAudio("a5");
}

function playStudent(){
    playAudio("a6");
}

</script>

</body>
</html>
