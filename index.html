<!DOCTYPE html>
<html>
<head>
<title>Job Portal</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
    text-align:center;
    font-family:Arial, sans-serif;
    margin-top:100px;
    background:#f2f2f2;
}

button{
    font-size:20px;
    padding:15px 25px;
    margin:10px;
    border:none;
    border-radius:8px;
    color:white;
    cursor:pointer;
    background:#e74c3c;
}

#qualification{
    display:none;
    margin-top:30px;
    font-size:22px;
}

#overlay{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.5);
    color:white;
    display:none;
    z-index:9999;
}

#overlayText{
    margin-top:40vh;
    font-size:24px;
}

</style>
</head>

<body>

<h2>Welcome to Job Portal</h2>

<button id="richBtn">₹1 Cr per month job</button>

<div id="qualification">
<h3>Required Qualifications</h3>
<p>BPSC</p>
<p>IIT</p>
<p>NEET</p>
</div>

<audio id="audio2">
<source src="fun.mp3" type="audio/mpeg">
</audio>

<div id="overlay">
<div id="overlayText">Please wait... audio is playing</div>
</div>

<script>

let richBtn = document.getElementById("richBtn");
let audio2 = document.getElementById("audio2");
let overlay = document.getElementById("overlay");

richBtn.onclick = function(){

    document.getElementById("qualification").style.display = "block";
    overlay.style.display = "block";

    audio2.play();
}

audio2.onended = function(){
    overlay.style.display = "none";
}

</script>

</body>
</html>
